<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StepUp — Teacher Portal</title>
<style>
  :root{
    --bg:#0d0b14;
    --panel:#171320;
    --panel-2:#1e1a29;
    --border:#2a2438;
    --purple:#8b5cf6;
    --purple-dark:#7c3aed;
    --orange:#f5a623;
    --orange-dark:#e0951a;
    --yellow:#f7d354;
    --yellow-dark:#e0b92e;
    --text:#f3f1f8;
    --text-dim:#9d97ad;
    --red:#e05d5d;
    --green:#4caf7d;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    min-height:100vh;
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#332c44;border-radius:8px;}
  a{color:inherit;}

  /* icons */
  .ic{width:1em;height:1em;flex-shrink:0;vertical-align:-0.15em;display:inline-block;}
  .ic svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  .ic-lg{width:1em;height:1em;}
  button, .btn{font-family:inherit;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:22px 16px;
    display:flex;
    flex-direction:column;
    gap:22px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .brand-title{
    font-size:26px;
    font-weight:800;
    letter-spacing:-0.5px;
  }
  .brand-title span{color:var(--purple);}
  .brand-sub{
    font-size:12px;
    color:var(--orange);
    font-weight:600;
    letter-spacing:0.5px;
  }
  .nav-group-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-dim);
    margin:0 0 8px 4px;
    font-weight:700;
  }
  .nav-list{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .nav-btn{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    color:var(--text-dim);
    padding:10px 12px;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    transition:background .15s, color .15s;
  }
  .nav-btn .ico{width:14px; text-align:center;}
  .nav-btn:hover{background:var(--panel-2); color:var(--text);}
  .nav-btn.active{
    background:linear-gradient(90deg, rgba(139,92,246,.25), rgba(139,92,246,.08));
    color:#fff;
    font-weight:600;
    box-shadow: inset 3px 0 0 var(--purple);
  }
  .nav-btn.nav-yellow{color:var(--yellow-dark);}
  .nav-btn.nav-yellow:hover{color:var(--yellow);}
  .nav-btn.nav-yellow.active{
    background:linear-gradient(90deg, rgba(247,211,84,.22), rgba(247,211,84,.06));
    color:var(--yellow);
    box-shadow: inset 3px 0 0 var(--yellow);
  }
  .nav-btn.nav-purple{color:var(--purple);}
  .nav-btn.nav-purple:hover{color:#ac8bfb;}
  .nav-btn.nav-purple.active{
    background:linear-gradient(90deg, rgba(139,92,246,.28), rgba(139,92,246,.08));
    color:#ac8bfb;
    box-shadow: inset 3px 0 0 var(--purple);
  }
  .brand-logo{width:100%; max-width:190px; height:auto; display:block;}
  .team-pill{
    display:inline-block;
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--orange);
    font-size:11px;
    font-weight:700;
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:14px;
  }
  .sidebar-footer{
    margin-top:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .btn-demo{
    background:var(--panel-2);
    color:var(--text-dim);
    border:1px solid var(--border);
    padding:10px;
    border-radius:10px;
    font-size:13px;
    text-align:center;
    cursor:pointer;
  }
  .btn-signup{
    background:linear-gradient(90deg, var(--purple), var(--purple-dark));
    color:#fff;
    border:none;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    text-align:center;
    cursor:pointer;
  }

  /* ---------- Main ---------- */
  .main{
    flex:1;
    padding:32px 40px;
    max-width:1100px;
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:26px;
    flex-wrap:wrap;
    gap:12px;
  }
  .topbar h1{
    margin:0 0 4px 0;
    font-size:28px;
    font-weight:800;
  }
  .topbar p{
    margin:0;
    color:var(--text-dim);
    font-size:14px;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:1px;
    color:var(--purple);
    font-weight:800;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .account-badge{
    background:linear-gradient(90deg, var(--orange), var(--orange-dark));
    color:#241a03;
    font-weight:700;
    font-size:13px;
    padding:8px 16px;
    border-radius:999px;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
    height:fit-content;
  }
  .view-only-note{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-size:12.5px;
    padding:10px 14px;
    border-radius:10px;
    margin-bottom:16px;
  }

  .section-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:26px 0 14px 0;
    flex-wrap:wrap;
    gap:10px;
  }
  .section-title h2{
    font-size:17px;
    margin:0;
    font-weight:700;
  }
  .btn{
    border:none;
    border-radius:9px;
    padding:9px 16px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn-purple{background:linear-gradient(90deg, var(--purple), var(--purple-dark)); color:#fff;}
  .btn-orange{background:linear-gradient(90deg, var(--orange), var(--orange-dark)); color:#241a03;}
  .btn-outline{background:transparent; border:1px solid var(--border); color:var(--text);}
  .btn-danger-ghost{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:6px;border-radius:6px;display:inline-flex;}
  .btn-danger-ghost:hover{color:var(--red); background:var(--panel-2);}
  .btn-edit-ghost{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:6px;border-radius:6px;display:inline-flex;}
  .btn-edit-ghost:hover{color:var(--purple); background:var(--panel-2);}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .row-actions{display:flex; gap:2px; align-items:center;}

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:14px;
  }
  .empty-hint{
    color:var(--text-dim);
    font-size:13px;
    padding:18px;
    text-align:center;
    border:1px dashed var(--border);
    border-radius:var(--radius);
  }

  /* form row */
  .inline-form{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:16px;
    background:var(--panel-2);
    border:1px solid var(--border);
    padding:14px;
    border-radius:var(--radius);
  }
  .inline-form input, .inline-form select, .inline-form textarea{
    background:#120f1a;
    border:1px solid var(--border);
    color:var(--text);
    border-radius:8px;
    padding:9px 10px;
    font-size:13px;
    font-family:inherit;
  }
  .inline-form input:focus, .inline-form select:focus, .inline-form textarea:focus{
    outline:1px solid var(--purple);
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:4px;
    flex:1;
    min-width:130px;
  }
  .field label{font-size:11px; color:var(--text-dim); font-weight:600;}

  /* search bar */
  .search-bar{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:9px 12px;
    margin-bottom:14px;
    color:var(--text-dim);
    max-width:320px;
  }
  .search-bar input{
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-size:13px;
    width:100%;
    font-family:inherit;
  }

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{
    text-align:left;
    color:var(--text-dim);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.5px;
    padding:10px 8px;
    border-bottom:1px solid var(--border);
  }
  td{
    padding:10px 8px;
    border-bottom:1px solid var(--border);
  }
  tr:last-child td{border-bottom:none;}
  .tag-income{color:var(--green); font-weight:700;}
  .tag-expense{color:var(--red); font-weight:700;}

  .team-tab-row{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .team-tab{
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text-dim);
    padding:8px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .team-tab.active{
    background:linear-gradient(90deg, var(--purple), var(--purple-dark));
    color:#fff;
    border-color:transparent;
  }

  .item-card{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    position:relative;
  }
  .item-card .title{font-weight:700; font-size:14px; margin-bottom:2px; padding-right:56px;}
  .item-card .sub{font-size:12px; color:var(--text-dim); margin-bottom:2px;}
  .item-card .card-actions{
    position:absolute; top:8px; right:8px; display:flex; gap:2px;
  }
  .due-chip{
    display:inline-block;
    background:linear-gradient(90deg,#c2483f,#a53c34);
    color:#fff;
    font-size:11px;
    font-weight:700;
    padding:5px 10px;
    border-radius:7px;
    margin-top:8px;
  }
  .stat-row{display:flex; gap:14px; margin-bottom:6px; flex-wrap:wrap;}
  .stat-box{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 18px;
    flex:1;
    min-width:140px;
  }
  .stat-box .num{font-size:22px; font-weight:800;}
  .stat-box .lbl{font-size:12px; color:var(--text-dim);}

  .msg-box{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
    font-size:13px;
  }
  .msg-box-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .comments-wrap{margin-top:10px; padding-top:10px; border-top:1px solid var(--border);}
  .comment-item{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
    font-size:12.5px;
    margin-bottom:6px;
  }
  .comment-item strong{color:var(--purple); font-size:12px;}
  .comment-form{display:flex; gap:8px; margin-top:8px;}
  .comment-form input{
    flex:1; background:#120f1a; border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:7px 10px; font-size:12.5px; font-family:inherit;
  }
  .btn-comment-toggle{
    background:transparent; border:1px solid var(--border); color:var(--text-dim);
    border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; margin-top:8px;
  }
  .btn-comment-toggle:hover{color:var(--purple); border-color:var(--purple);}

  .calendar{width:100%; border-collapse:collapse;}
  .calendar th{text-align:center;}
  .calendar td{
    height:64px;
    vertical-align:top;
    border:1px solid var(--border);
    padding:4px;
    font-size:11px;
    color:var(--text-dim);
    cursor:pointer;
    position:relative;
  }
  .calendar td:hover{background:var(--panel-2);}
  .calendar td .daynum{font-size:12px; font-weight:700; color:var(--text);}
  .calendar td .dot{
    display:inline-block; width:6px;height:6px;border-radius:50%;
    background:var(--purple); margin-top:4px;
  }
  .cal-nav{display:flex; align-items:center; gap:14px; margin-bottom:10px;}
  .cal-nav button{
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    width:30px;height:30px;border-radius:8px;cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .toolbar-desc{color:var(--text-dim); font-size:13px; margin-bottom:16px;}

  /* costume list rows */
  .list-rows{display:flex; flex-direction:column; gap:8px;}
  .list-row{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
  }
  .list-row.checked{opacity:.6;}
  .list-row .chk{width:18px;height:18px; accent-color:var(--purple); cursor:pointer; flex-shrink:0;}
  .list-row .lr-main{flex:1; min-width:0;}
  .list-row .lr-title{font-weight:700; font-size:14px;}
  .list-row .lr-title.done{text-decoration:line-through; color:var(--text-dim);}
  .list-row .lr-sub{font-size:12px; color:var(--text-dim);}

  /* Modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(5,4,10,.7);
    display:flex; align-items:center; justify-content:center;
    z-index:500; padding:20px;
  }
  .modal-box{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:24px; max-width:440px; width:100%; max-height:85vh; overflow-y:auto;
  }
  .modal-box h3{margin:0 0 4px 0; font-size:19px;}
  .modal-close{
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    width:28px;height:28px;border-radius:8px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
    float:right;
  }
  .modal-detail-row{margin:10px 0; font-size:13.5px;}
  .modal-detail-row .k{color:var(--text-dim); font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px;}
  .modal-actions{display:flex; gap:10px; margin-top:18px;}

  /* ---------- Onboarding / marketing pages ---------- */
  .onb-overlay{
    position:fixed; inset:0; background:var(--bg); overflow-y:auto; z-index:400;
  }
  .onb-nav{
    display:flex; justify-content:space-between; align-items:center;
    padding:18px 40px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:rgba(13,11,20,.92); backdrop-filter:blur(6px); z-index:2;
  }
  .onb-logo{font-weight:800; font-size:14px; letter-spacing:1px;}
  .onb-links{display:flex; gap:28px;}
  .onb-links button{
    background:none; border:none; color:var(--text-dim); font-size:13px; cursor:pointer; font-family:inherit;
  }
  .onb-links button:hover, .onb-links button.active{color:#fff;}
  .onb-wrap{max-width:1000px; margin:0 auto; padding:50px 40px 0 40px;}
  .onb-pill{
    display:block; text-align:center; margin:0 auto 26px auto; max-width:420px;
    background:linear-gradient(90deg, var(--orange), var(--orange-dark)); color:#241a03;
    font-size:11px; font-weight:800; letter-spacing:.5px; padding:8px 18px; border-radius:999px;
  }
  .onb-pill.purple{background:linear-gradient(90deg, var(--purple), var(--purple-dark)); color:#fff;}
  .onb-hero h1{text-align:center; font-size:34px; font-weight:800; margin:0 0 16px 0; line-height:1.25;}
  .onb-hero p.lead{text-align:center; color:var(--text-dim); font-size:14.5px; max-width:640px; margin:0 auto 26px auto;}
  .onb-btn-row{display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:50px;}
  .onb-btn{
    border:none; border-radius:10px; padding:13px 30px; font-size:13.5px; font-weight:700;
    cursor:pointer; min-width:230px; text-align:center; font-family:inherit;
  }
  .onb-btn-orange{background:linear-gradient(90deg, var(--orange), var(--orange-dark)); color:#241a03;}
  .onb-btn-purple{background:linear-gradient(90deg, var(--purple), var(--purple-dark)); color:#fff;}
  .onb-section-title{text-align:center; font-size:24px; font-weight:800; margin:0 0 8px 0;}
  .onb-section-title.purple{color:var(--purple);}
  .onb-section-sub{text-align:center; color:var(--text-dim); font-size:13.5px; max-width:560px; margin:0 auto 30px auto;}
  .onb-card-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:50px;}
  .onb-feat-card{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px;}
  .onb-feat-icon{
    width:36px;height:36px;border-radius:10px;font-size:18px;
    background:linear-gradient(135deg, var(--orange), var(--orange-dark));
    display:flex;align-items:center;justify-content:center;margin-bottom:12px;color:#241a03;
  }
  .onb-feat-icon.purple{background:linear-gradient(135deg, var(--purple), var(--purple-dark)); color:#fff;}
  .onb-feat-card .t{font-weight:800; font-size:13px; letter-spacing:.3px; margin-bottom:6px;}
  .onb-feat-card .d{font-size:12.5px; color:var(--text-dim); line-height:1.5;}
  .onb-feat-card.cta{background:linear-gradient(135deg, var(--purple), var(--purple-dark)); color:#fff;}
  .onb-feat-card.cta .d{color:rgba(255,255,255,.85);}
  .onb-split{display:grid; grid-template-columns:1.1fr 1fr; gap:40px; align-items:center; margin-bottom:50px;}
  .onb-split h2{font-size:22px; font-weight:800; margin:0 0 12px 0;}
  .onb-split p{color:var(--text-dim); font-size:13.5px; line-height:1.6; margin-bottom:16px;}
  .onb-checklist{list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:10px;}
  .onb-checklist li{display:flex; align-items:center; gap:10px; font-size:13.5px;}
  .onb-check-dot{
    width:20px;height:20px;border-radius:50%;font-size:11px;background:linear-gradient(135deg, var(--orange), var(--orange-dark));
    display:flex;align-items:center;justify-content:center;color:#241a03;flex-shrink:0;
  }
  .onb-photo{
    height:260px;border-radius:16px;
    background:linear-gradient(160deg,#221a3a,#0d0b14 70%);
    display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:12px;
    border:1px solid var(--border);
  }
  .onb-cta-box{
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    padding:34px; text-align:center; margin-bottom:50px;
  }
  .onb-cta-box h2{font-size:22px; font-weight:800; margin:0 0 8px 0;}
  .onb-cta-box p{color:var(--text-dim); font-size:13.5px; margin:0 0 20px 0;}
  .onb-footer{border-top:1px solid var(--border); padding:20px 40px; color:var(--purple); font-size:12.5px; font-weight:600;}
  .onb-hero-split{display:grid; grid-template-columns:1.1fr 1fr; gap:30px; align-items:center; padding:20px 0 60px 0;}
  .onb-hero-split h1{font-size:34px; text-align:left; margin:0 0 14px 0;}
  .onb-hero-split .lead{text-align:left; margin:0 0 22px 0;}
  .onb-hero-split .btn-pair{display:flex; gap:12px;}
  .onb-hero-split .btn-pair .onb-btn{min-width:0; flex:1;}
  .onb-dancer{
    height:320px;border-radius:16px;position:relative;overflow:hidden;
    border:1px solid var(--border);
  }
  .onb-dancer img{width:100%; height:100%; object-fit:cover; display:block;}
  .onb-testi{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px;}
  .onb-testi .who{font-weight:800; font-size:13px; margin-bottom:10px;}
  .onb-testi .avatar{
    width:34px;height:34px;border-radius:50%;font-size:16px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));
    display:flex;align-items:center;justify-content:center;color:#241a03;margin-bottom:8px;
  }
  .onb-testi .quote{font-size:12.5px; color:var(--text-dim); line-height:1.5;}
  .onb-login-wrap{display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:start; padding:60px 0;}
  .onb-login-wrap h1{font-size:30px; text-align:left; color:var(--orange);}
  .onb-login-wrap.student h1{color:var(--purple);}
  .onb-login-wrap p.lead{text-align:left; margin:0 0 30px 0;}
  .onb-hr{border:none; border-top:1px solid var(--border); margin:30px 0;}
  .onb-login-card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:26px;}
  .onb-login-card h3{margin:0 0 4px 0; font-size:19px;}
  .onb-login-card p.sub{color:var(--text-dim); font-size:13px; margin:0 0 20px 0;}
  .onb-login-card .field{margin-bottom:14px;}
  .onb-login-card label{display:block; font-size:12px; font-weight:700; margin-bottom:6px;}
  .onb-login-card select, .onb-login-card input{
    width:100%; background:#120f1a; border:1px solid var(--border); color:var(--text);
    border-radius:9px; padding:10px 12px; font-size:13px; font-family:inherit;
  }
  .onb-or{text-align:center; color:var(--text-dim); font-size:12px; margin:12px 0;}
  .onb-note-box{
    display:flex; gap:10px; background:var(--panel-2); border:1px solid var(--border);
    border-radius:10px; padding:12px; margin-top:16px; color:var(--text-dim); font-size:12px; line-height:1.5;
  }
  .onb-steps{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:50px;}
  .onb-step-card{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px;}
  .onb-step-num{font-size:22px; font-weight:800; color:var(--purple); margin-bottom:6px;}
  .onb-step-card .t{font-weight:800; font-size:14px; margin-bottom:6px;}
  .onb-step-card .d{font-size:12.5px; color:var(--text-dim); line-height:1.5;}

  @media (max-width: 900px){
    .onb-split, .onb-hero-split, .onb-login-wrap{grid-template-columns:1fr;}
  }
  @media (max-width: 800px){
    body{flex-direction:column;}
    .sidebar{width:100%; height:auto; position:relative; flex-direction:row; overflow-x:auto;}
    .main{padding:20px;}
    .onb-wrap{padding:30px 18px 0 18px;}
    .onb-nav{padding:16px 18px;}
  }
</style>
</head>

/* ---------------------------------------------------------
   CLOUD SYNC (Firebase Firestore)
   ---------------------------------------------------------
   1. Go to https://console.firebase.google.com, create a free
      project, then Build > Firestore Database > Create database
      (start in TEST MODE for a school project demo).
   2. Project settings (gear icon) > General > "Your apps" >
      Add app > Web (</>) > copy the firebaseConfig object it
      gives you and paste the values below.
   3. Every device that loads this file with the SAME config
      will read/write the SAME Firestore document, so changes
      made on one device show up on the other automatically.
   If FIREBASE_CONFIG is left blank, the app just falls back to
   the old in-memory-only behaviour (nothing syncs, nothing
   breaks).
--------------------------------------------------------- */
const FIREBASE_CONFIG = {
  apiKey: "",
  authDomain: "",
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
};
/* Every team using the app shares this document unless you change it.
   To give each dance team its own separate data, set this to something
   unique per school/team, e.g. state.school. */
const SYNC_DOC_ID = "stepup-demo-team";

/* Only these keys are treated as shared "team data" and synced.
   UI-only state (which tab is open, current search box text, etc.)
   stays local to each device on purpose. */
const SYNCED_KEYS = [
  "teacherName", "school", "schoolSuburb", "email",
  "teams", "students", "members", "finance", "events",
  "announcements", "musicJobs", "costumes", "reminders",
  "studentName", "studentTeamIds"
];

let cloudEnabled = false;
let cloudDocRef = null;
let applyingRemoteUpdate = false;
let saveTimer = null;

function cloudConfigured(){
  return !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId);
}

function initCloudSync(){
  if(!cloudConfigured() || typeof firebase === 'undefined'){
    console.info('StepUp: cloud sync not configured — running in local-only demo mode.');
    return;
  }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    cloudDocRef = db.collection('stepupTeams').doc(SYNC_DOC_ID);
    cloudEnabled = true;

    cloudDocRef.onSnapshot(snap => {
      if(!snap.exists){
        // Nothing in the cloud yet — seed it with the current (demo) state.
        saveState(true);
        return;
      }
      const data = snap.data();
      applyingRemoteUpdate = true;
      SYNCED_KEYS.forEach(key => {
        if(data[key] !== undefined) state[key] = data[key];
      });
      applyingRemoteUpdate = false;
      // Don't yank the person away from the onboarding/marketing pages —
      // just update the underlying data quietly; render() runs once they
      // actually log in / open the app.
      const onbOverlay = document.getElementById('onbOverlay');
      if(!onbOverlay || onbOverlay.style.display === 'none') render();
    }, err => {
      console.error('StepUp cloud sync error:', err);
    });
  } catch(err){
    console.error('StepUp: failed to initialise Firebase.', err);
    cloudEnabled = false;
  }
}

/* Debounced write-back to Firestore. Safe to call after every local
   change — rapid calls get batched into one network write. */
function saveState(immediate){
  if(!cloudEnabled || applyingRemoteUpdate) return;
  clearTimeout(saveTimer);
  const doSave = () => {
    const payload = {};
    SYNCED_KEYS.forEach(key => payload[key] = state[key]);
    cloudDocRef.set(payload, { merge: true }).catch(err => console.error('StepUp save failed:', err));
  };
  if(immediate) doSave();
  else saveTimer = setTimeout(doSave, 500);
}

function matches(q, ...fields){
  if(!q) return true;
  q = q.toLowerCase();
  return fields.some(f => (f||'').toString().toLowerCase().includes(q));
}

let memberEditId = null;
function renderTeamMembersTool(){

let rosterSearchQuery = '';
function drawTeamMembersBody(){
  const teamId = state.currentTeamByTool['teammembers'];
  const q = state.searchByTool['teammembers'] || '';
  const list = (state.members[teamId] || []).filter(m => matches(q, m.name, m.role));
  const editingItem = memberEditId ? (state.members[teamId]||[]).find(x => x.id === memberEditId) : null;
  const showAddPanel = canManage() && !editingItem;
  const body = document.getElementById('tmBody');
  body.innerHTML = `
    <div class="section-title"><h2>${teamName(teamId)} — Team Members</h2></div>
    ${searchBar('teammembers', 'Search members by name or role...')}
    ${editingItem ? `
    <div class="inline-form" id="memberForm">
      <div class="field"><label>Name</label><input id="mName" value="${editingItem.name}"></div>
      <div class="field"><label>Role</label><input id="mRole" placeholder="e.g. Dancer" value="${editingItem.role}"></div>

      <button class="btn btn-outline" id="cancelMemberEditBtn" style="align-self:flex-end;">Cancel</button>
    </div>` : ''}
    ${showAddPanel ? `
    <div class="section-title" style="margin-top:0;"><h3 style="margin:0; font-size:15px;">Add a Student to This Team</h3></div>
    <p class="toolbar-desc" style="margin-top:-6px;">Search your teacher's student roster and add them straight onto this team.</p>
    <div class="inline-form" id="rosterAddForm">
      <div class="field" style="flex:1;"><label>Search Students</label><input id="rosterSearch" placeholder="Search by name or role..." value="${rosterSearchQuery}"></div>
    </div>
    <div class="grid" id="rosterResults"></div>
    ` : ''}
    <div class="card">
      <table>
        <thead><tr><th>Name</th><th>Role</th><th>Attendance</th><th>Tasks</th><th></th></tr></thead>
        <tbody>
          ${list.length ? list.map(m => `
            <tr>
              <td>${m.name}</td>
              <td>${m.role}</td>
              <td>${m.attendance}%</td>
              <td>${m.tasks}</td>
              <td><div class="row-actions">
                <button class="btn-edit-ghost" data-edit="${m.id}">${ic('edit')}</button>
                ${canManage() ? `<button class="btn-danger-ghost" data-id="${m.id}">${ic('trash')}</button>` : ''}
              </div></td>
            </tr>`).join('') : `<tr><td colspan="5" style="text-align:center; color:var(--text-dim); padding:20px;">No members match.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
  bindSearchBar('teammembers', () => drawTeamMembersBody());

  body.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => {
    memberEditId = Number(b.dataset.edit);
    drawTeamMembersBody();
  }));
  if(canManage()){
    body.querySelectorAll('[data-id]').forEach(b => b.addEventListener('click', () => {
      state.members[teamId] = state.members[teamId].filter(m => m.id != b.dataset.id);
      if(memberEditId == b.dataset.id) memberEditId = null;
      drawTeamMembersBody();
    }));
  }

  if(editingItem){
    document.getElementById('cancelMemberEditBtn').addEventListener('click', () => {
      memberEditId = null;
      drawTeamMembersBody();
    });
    document.getElementById('addMemberBtn').addEventListener('click', () => {
      const name = document.getElementById('mName').value.trim(); if(!name) return;
      const role = document.getElementById('mRole').value.trim() || 'Dancer';
      const attendance = Number(document.getElementById('mAtt').value) || 0;
      const tasks = document.getElementById('mTasks').value.trim() || '0/5';
      const m = state.members[teamId].find(x => x.id === memberEditId);
      Object.assign(m, { name, role, attendance, tasks });
      memberEditId = null;
      drawTeamMembersBody();
    });
    return;
  }

  if(showAddPanel){
    const searchInput = document.getElementById('rosterSearch');
    searchInput.addEventListener('input', () => {
      rosterSearchQuery = searchInput.value;
      drawRosterResults(teamId);
    });
    searchInput.focus();
    searchInput.selectionStart = searchInput.selectionEnd = searchInput.value.length;
    drawRosterResults(teamId);
  }

  saveState();
}
function drawRosterResults(teamId){
  const resultsEl = document.getElementById('rosterResults');
  if(!resultsEl) return;
  const addedStudentIds = new Set((state.members[teamId] || []).map(m => m.studentId).filter(id => id != null));
  const available = state.students.filter(s => !addedStudentIds.has(s.id) && matches(rosterSearchQuery, s.name, s.role));
  resultsEl.innerHTML = available.length ? available.map(s => `
    <div class="item-card">
      <div class="title">${s.name}</div>
      <div class="sub">${s.role || 'Unassigned'}</div>
      <button class="btn btn-purple" style="margin-top:10px; width:100%;" data-add-roster="${s.id}">${ic('plus')} Add to Team</button>
    </div>
  `).join('') : `<div class="empty-hint">${state.students.length ? 'No matching students found — ask your teacher to add them first.' : 'No students in the roster yet — ask your teacher to add some.'}</div>`;

  resultsEl.querySelectorAll('[data-add-roster]').forEach(b => b.addEventListener('click', () => {
    const studentId = Number(b.dataset.addRoster);
    const s = state.students.find(x => x.id === studentId);
    if(!s) return;
    state.members[teamId] = state.members[teamId] || [];
    state.members[teamId].push({ id: nextId(), studentId: s.id, name: s.name, role: s.role || 'Dancer', attendance: 90, tasks: '0/5' });
    drawTeamMembersBody();
  }));
}

--------------------------------------------------------- */
let txEditId = null;
function renderFinanceTool(){
  const main = document.getElementById('main');
  main.innerHTML = `
    ${topbar('Tool', 'Finance Tracker', 'Log income and expenses and see a running balance for each team.')}
    ${viewOnlyNote()}
    ${teamTabs('finance')}
    <div id="finBody"></div>
  `;
  bindTeamTabs('finance', renderFinanceTool);
  txEditId = null;
  drawFinanceBody();
}
function drawFinanceBody(){
  const teamId = state.currentTeamByTool['finance'];
  const q = state.searchByTool['finance'] || '';
  const full = state.finance[teamId] || [];
  let balance = 0;
  const withBalance = full.map(t => { balance += (t.income - t.expense); return { ...t, balance }; });
  const rows = withBalance.filter(t => matches(q, t.desc, t.cat));
  const totalIncome = full.reduce((a,t)=>a+t.income,0);
  const totalExpense = full.reduce((a,t)=>a+t.expense,0);

  const editingItem = txEditId ? full.find(x => x.id === txEditId) : null;
  const showForm = canManage() || editingItem;
  const body = document.getElementById('finBody');
  body.innerHTML = `
    <div class="stat-row">
      <div class="stat-box"><div class="num" style="color:var(--green)">$${totalIncome.toFixed(2)}</div><div class="lbl">Total Income</div></div>
      <div class="stat-box"><div class="num" style="color:var(--red)">$${totalExpense.toFixed(2)}</div><div class="lbl">Total Expenses</div></div>
      <div class="stat-box"><div class="num">$${balance.toFixed(2)}</div><div class="lbl">Balance</div></div>
    </div>
    <div class="section-title"><h2>${teamName(teamId)} — Transactions</h2></div>
    ${searchBar('finance', 'Search transactions by description or category...')}
    ${showForm ? `
    <div class="inline-form" id="txForm">
      <div class="field"><label>Description</label><input id="txDesc" placeholder="e.g. Costumes" value="${editingItem ? editingItem.desc : ''}"></div>
      <div class="field" style="max-width:140px;"><label>Category</label>
        <select id="txCat"><option value="Income" ${editingItem && editingItem.cat==='Income' ? 'selected':''}>Income</option><option value="Expense" ${editingItem && editingItem.cat==='Expense' ? 'selected':''}>Expense</option></select>
      </div>
      <div class="field" style="max-width:120px;"><label>Amount</label><input id="txAmt" type="number" min="0" step="0.01" value="${editingItem ? (editingItem.income || editingItem.expense) : 0}"></div>
      <div class="field" style="max-width:150px;"><label>Date</label><input id="txDate" type="date" value="${editingItem ? editingItem.date : '2026-07-01'}"></div>
      <button class="btn btn-purple" id="addTxBtn" style="align-self:flex-end;">${ic(editingItem ? 'edit' : 'plus')} <span id="txBtnLabel">${editingItem ? 'Save Changes' : 'Add Transaction'}</span></button>
    </div>` : ''}
    <div class="card">
      <table>
        <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Income</th><th>Expense</th><th>Balance</th><th></th></tr></thead>
        <tbody>
          ${rows.length ? rows.map(t => `
            <tr>
              <td>${formatDate(t.date)}</td>
              <td>${t.desc}</td>
              <td>${t.cat}</td>
              <td class="tag-income">${t.income ? '$'+t.income.toFixed(2) : ''}</td>
              <td class="tag-expense">${t.expense ? '$'+t.expense.toFixed(2) : ''}</td>
              <td>$${t.balance.toFixed(2)}</td>
              <td><div class="row-actions">
                <button class="btn-edit-ghost" data-edit="${t.id}">${ic('edit')}</button>
                ${canManage() ? `<button class="btn-danger-ghost" data-id="${t.id}">${ic('trash')}</button>` : ''}
              </div></td>
            </tr>`).join('') : `<tr><td colspan="7" style="text-align:center; color:var(--text-dim); padding:20px;">No transactions match.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
  bindSearchBar('finance', () => drawFinanceBody());

  body.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => {
    txEditId = Number(b.dataset.edit);
    drawFinanceBody();
  }));
  if(canManage()){
    body.querySelectorAll('[data-id]').forEach(b => b.addEventListener('click', () => {
      state.finance[teamId] = state.finance[teamId].filter(t => t.id != b.dataset.id);
      if(txEditId == b.dataset.id) txEditId = null;
      drawFinanceBody();
    }));
  }
  if(!showForm) return;
  document.getElementById('addTxBtn').addEventListener('click', () => {
    const desc = document.getElementById('txDesc').value.trim(); if(!desc) return;
    const cat = document.getElementById('txCat').value;
    const amount = Number(document.getElementById('txAmt').value) || 0;
    const date = document.getElementById('txDate').value || '2026-07-01';
    const isIncome = cat === 'Income';
    state.finance[teamId] = state.finance[teamId] || [];
    if(txEditId){
      const t = state.finance[teamId].find(x => x.id === txEditId);
      Object.assign(t, { desc, cat, date, income: isIncome ? amount : 0, expense: isIncome ? 0 : amount });
      txEditId = null;
    } else {
      state.finance[teamId].push({ id: nextId(), date, desc, cat, income: isIncome ? amount : 0, expense: isIncome ? 0 : amount });
    }
    drawFinanceBody();
  });

  saveState();
}

  saveState();
}

--------------------------------------------------------- */
let eventEditId = null;
let eventEditTeamId = null;
function renderCalendarTool(preserveEdit){
  if(!preserveEdit){ eventEditId = null; eventEditTeamId = null; }
  const editingItem = (eventEditId && eventEditTeamId) ? (state.events[eventEditTeamId]||[]).find(x => x.id === eventEditId) : null;
  const showForm = canManage() || editingItem;
  const main = document.getElementById('main');
  main.innerHTML = `
    ${topbar('Tool', 'Calendar', 'Every event across your teams — click a day or an event for full details.')}
    ${viewOnlyNote()}
    ${searchBar('calendar', 'Search events by activity, location or team...')}
    ${showForm ? `
    <div class="inline-form" id="evForm">
      <div class="field"><label>Activity</label><input id="evActivity" placeholder="e.g. Rehearsal" value="${editingItem ? editingItem.activity : ''}"></div>
      <div class="field" style="max-width:170px;"><label>Team</label>
        <select id="evTeam">${visibleTeams().map(t=>`<option value="${t.id}" ${editingItem && editingItem.teamId===t.id ? 'selected':''}>${t.name}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Location</label><input id="evLoc" placeholder="e.g. Studio A" value="${editingItem ? editingItem.location : 'TBC'}"></div>
      <div class="field"><label>Details</label><input id="evDetails" placeholder="e.g. 4:00 PM" value="${editingItem ? editingItem.details : ''}"></div>
      <div class="field" style="max-width:170px;"><label>Date</label><input id="evDate" type="date" value="${editingItem ? editingItem.date : '2026-07-15'}"></div>
      <button class="btn btn-purple" id="addEvBtn" style="align-self:flex-end;">${ic(editingItem ? 'edit' : 'plus')} <span id="evBtnLabel">${editingItem ? 'Save Changes' : 'Add an Event'}</span></button>
    </div>` : ''}
    <div class="cal-nav">
      <button id="prevMonth">${ic('chevronLeft')}</button>
      <strong>${MONTH_NAMES[calMonth]} ${calYear}</strong>
      <button id="nextMonth">${ic('chevronRight')}</button>
    </div>
    <div class="card" id="calCard"></div>
    <div class="section-title"><h2>Events this month</h2></div>
    <div id="calList"></div>
  `;
  document.getElementById('prevMonth').addEventListener('click', () => {
    calMonth--; if(calMonth<0){calMonth=11; calYear--;} renderCalendarTool();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    calMonth++; if(calMonth>11){calMonth=0; calYear++;} renderCalendarTool();
  });
  bindSearchBar('calendar', () => drawCalendarGrid());
  if(showForm){
    document.getElementById('addEvBtn').addEventListener('click', () => {
      const activity = document.getElementById('evActivity').value.trim(); if(!activity) return;
      const teamId = Number(document.getElementById('evTeam').value);
      const location = document.getElementById('evLoc').value.trim() || 'TBC';
      const details = document.getElementById('evDetails').value.trim();
      const date = document.getElementById('evDate').value || '2026-07-15';
      state.events[teamId] = state.events[teamId] || [];
      if(eventEditId && eventEditTeamId){
        const list = state.events[eventEditTeamId];
        const idx = list.findIndex(e => e.id === eventEditId);
        if(idx > -1) list.splice(idx,1);
        state.events[teamId].push({ id: eventEditId, activity, location, details, date, teamId });
        eventEditId = null; eventEditTeamId = null;
      } else {
        state.events[teamId].push({ id: nextId(), activity, location, details, date, teamId });
      }
      renderCalendarTool();
    });
  }
  drawCalendarGrid();
}
function allEventsFlat(){
  let all = [];
  visibleTeams().forEach(t => (state.events[t.id]||[]).forEach(e => all.push({ ...e, teamId: t.id })));
  return all;
}
window.editEvent = function(id, teamId){
  eventEditId = id; eventEditTeamId = teamId;
  renderCalendarTool(true);
};
window.deleteEvent = function(id, teamId){
  if(!canManage()) return;
  state.events[teamId] = (state.events[teamId]||[]).filter(e => e.id != id);
  if(eventEditId == id) { eventEditId = null; eventEditTeamId = null; }
  if(activeTool === 'calendar') drawCalendarGrid();
};
function drawCalendarGrid(){
  const q = state.searchByTool['calendar'] || '';
  const monthEvents = allEventsFlat().filter(e => {
    const d = new Date(e.date + 'T00:00:00');
    return d.getMonth() === calMonth && d.getFullYear() === calYear;
  });
  const eventsByDay = {};
  monthEvents.forEach(e => {
    const day = new Date(e.date + 'T00:00:00').getDate();
    eventsByDay[day] = eventsByDay[day] || [];
    eventsByDay[day].push(e);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  let cells = [];
  for(let i=0;i<firstDay;i++) cells.push('<td></td>');
  for(let d=1; d<=daysInMonth; d++){
    const has = eventsByDay[d];
    cells.push(`<td data-day="${d}">
      <div class="daynum">${d}</div>
      ${has ? `<div class="dot" title="${has.map(e=>e.activity).join(', ')}"></div>` : ''}
    </td>`);
  }
  while(cells.length % 7 !== 0) cells.push('<td></td>');
  let rows = '';
  for(let i=0;i<cells.length;i+=7) rows += `<tr>${cells.slice(i,i+7).join('')}</tr>`;

  document.getElementById('calCard').innerHTML = `
    <table class="calendar">
      <thead><tr><th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  document.querySelectorAll('#calCard td[data-day]').forEach(td => td.addEventListener('click', () => {
    const day = Number(td.dataset.day);
    const dayEvents = eventsByDay[day];
    if(!dayEvents || !dayEvents.length) return;
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    if(dayEvents.length === 1) openEventModal(dayEvents[0]);
    else openDayListModal(dayEvents, formatDate(dateStr));
  }));

  const filtered = monthEvents.filter(e => matches(q, e.activity, e.location, teamName(e.teamId)));
  const listEl = document.getElementById('calList');
  const sorted = filtered.slice().sort((a,b)=>a.date.localeCompare(b.date));
  listEl.innerHTML = sorted.length ? sorted.map(e => `
    <div class="msg-box" style="cursor:pointer;" data-openev="${e.id}" data-team="${e.teamId}">
      <div class="msg-box-top">
        <span><strong>${e.activity}</strong> — ${teamName(e.teamId)} · ${formatDate(e.date)} · ${e.location}</span>
        <div class="row-actions" onclick="event.stopPropagation()">
          <button class="btn-edit-ghost" data-edit="${e.id}" data-editteam="${e.teamId}">${ic('edit')}</button>
          ${canManage() ? `<button class="btn-danger-ghost" data-del="${e.id}" data-delteam="${e.teamId}">${ic('trash')}</button>` : ''}
        </div>
      </div>
    </div>
  `).join('') : `<div class="empty-hint">No events match.</div>`;

  listEl.querySelectorAll('[data-openev]').forEach(el => el.addEventListener('click', (evt) => {
    if(evt.target.closest('.row-actions')) return;
    const ev = (state.events[el.dataset.team]||[]).find(x => x.id == el.dataset.openev);
    if(ev) openEventModal(ev);
  }));
  listEl.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => editEvent(Number(b.dataset.edit), Number(b.dataset.editteam))));
  listEl.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => deleteEvent(Number(b.dataset.del), Number(b.dataset.delteam))));

  saveState();
}

/* ---------------------------------------------------------
   HELPERS
--------------------------------------------------------- */
function teamName(id){
  const t = state.teams.find(x => x.id == id);
  return t ? t.name : 'Team';
}
function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

function bindOnboardingEvents(){
  document.querySelectorAll('[data-onb]').forEach(b => b.addEventListener('click', () => showOnboarding(b.dataset.onb)));
  document.querySelectorAll('[data-onb-goto]').forEach(b => b.addEventListener('click', () => showOnboarding(b.dataset.onbGoto)));
  document.querySelectorAll('[data-onb-demo]').forEach(b => b.addEventListener('click', () => demoLogin(b.dataset.onbDemo)));
  document.querySelectorAll('[data-open-email-modal]').forEach(b => b.addEventListener('click', () => openEmailTeacherModal()));
}

function emailField(id, label, value, placeholder){
  return `<div class="field" style="margin-bottom:14px;">
    <label style="display:block; font-size:12px; font-weight:700; margin-bottom:6px;">${label}</label>
    <input id="${id}" value="${(value||'').replace(/"/g,'&quot;')}" placeholder="${placeholder||''}"
      style="width:100%; background:#120f1a; border:1px solid var(--border); color:var(--text); border-radius:9px; padding:10px 12px; font-size:13px; font-family:inherit;">
  </div>`;
}
function openEmailTeacherModal(){
  openModal(`
    <button class="modal-close" onclick="closeModal()">${ic('close')}</button>
    <h3>Email My Teacher</h3>
    <p style="color:var(--text-dim); font-size:13px; margin:2px 0 18px 0;">We've pre-filled everything — just add your teacher's email and send.</p>
    ${emailField('etSchool', "School's Name", state.school)}
    ${emailField('etSuburb', "School's Suburb", state.schoolSuburb)}
    ${emailField('etTeacherName', "Teacher's Name", state.teacherName)}
    ${emailField('etTeacherEmail', "Teacher's Email", '', 'teacher@school.edu')}
    <div class="modal-actions" style="justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-purple" id="sendEmailBtn">Send Email</button>
    </div>
  `);
  document.getElementById('sendEmailBtn').addEventListener('click', () => {
    const teacherEmailInput = document.getElementById('etTeacherEmail');
    const teacherEmail = teacherEmailInput.value.trim();
    if(!teacherEmail){ teacherEmailInput.focus(); return; }
    const teacherName = document.getElementById('etTeacherName').value.trim() || state.teacherName;
    const studentName = state.studentName;
    const subject = "Check out StepUp for our dance program";
    const body = "Dear " + teacherName + ",\n\n" +
      "I hope you're doing well.\n\n" +
      "I recently found an app called StepUp and thought it could be a great resource for our school's dance program.\n\n" +
      "StepUp is a digital workspace that helps students and teachers organise rehearsals, track progress, manage choreography with formations, counts and notes, and create or edit music for performances. It also includes an AI assistant that can provide choreography ideas and creative inspiration.\n\n" +
      "The app offers editable templates for performance logs, event planning, team information, budgeting, and other administrative tasks, while allowing students and teachers to collaborate in a shared workspace where rehearsal plans and choreography can be stored in one place.\n\n" +
      "I thought it looked like a useful way to make planning, organising, and preparing for performances and competitions more efficient, so I wanted to share it with you.\n\n" +
      "Thank you for taking the time to read this. I hope you'll consider having a look at it.\n\n" +
      "Kind regards,\n" + studentName;
    const gmailUrl = "https://mail.google.com/mail/?view=cm&fs=1&to=" + encodeURIComponent(teacherEmail) +
      "&su=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
    window.open(gmailUrl, '_blank');
    closeModal();
  });
}
